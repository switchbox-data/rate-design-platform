# Phase 2 fetch for Cecil County's phased non-fuel energy rates.
#
# Fetches Chesapeake RES-1 and RES-2 with --year 2027 to capture the
# Phase 2 non-fuel energy charge (effective 4/19/2026 – 4/18/2030).
# Only the Cecil County non-fuel energy charge from these CSVs is used
# by split_chesapeake_gas_tariffs.py; all other rates (GSR, franchise
# tax, SIR, customer charge) come from the primary Phase 1 fetch.
#
# The split script computes a time-weighted average of Phase 1 (1 yr)
# and Phase 2 (4 yr) to produce the levelized ("Phase 3") non-fuel
# energy charge for Cecil County.
state: MD
chesapeake_utilities:
  chesapeake_utilities_res1_phase2: "RES-1-RESIDENTIAL SERVICE-1---150"
  chesapeake_utilities_res2_phase2: "RES-2-RESIDENTIAL SERVICE-2--151-"
