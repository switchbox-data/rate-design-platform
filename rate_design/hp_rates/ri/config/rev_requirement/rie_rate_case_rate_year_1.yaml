# RIE revenue requirement budgets sourced from rate case filings.
#
# Source: Docket 25-45-GE, RIE Book 21, Blazunas Schedules & Workpapers (11/26/2025)
# https://www.documentcloud.org/documents/27926651-docket-25-45-ge-rie-book-21-blazunas-schedules-workpapers-11262025/?mode=document
#
# This scenario increases billing determinants (residential customer count, residential kWh), customer charges, and core delivery rate to line
# up with Rate Year 1 proposal.
#
# A few of the delivery top-ups get slight adjustments, following the proposal: transmission uncollectible, long-term contracting,
# ee and srp uncollectible.
#
# One of the supply top-ups gets a slight adjustment, following the proposal: lrs administrative cost adjustment factor.
#
# All other delivery top-ups and supply top-ups remain unchanged.
#
# Finally, we recalculate supply commodity bundled budget using the 2025 rates, as in the test year file,
# but using the new billing determinants. This matches what RIE does in Book 21. The idea is that the world
# has changed—they need to factor in how the billing determinants have changed their revenue because they
# can determine if they need to hike rates to fill a revenue shortfall—but since supply is a pass-through,,
# they don't attempt to forecast the LRS rate in the future, they just keep it constant, but apply the new
# billing determinants to be internally consistent.
utility: rie
# --- From p. 3 of PRB-2-ELEC exhibit, line 27, column d ---
# https://www.documentcloud.org/documents/27926651-docket-25-45-ge-rie-book-21-blazunas-schedules-workpapers-11262025/#document/p36/a2810084
