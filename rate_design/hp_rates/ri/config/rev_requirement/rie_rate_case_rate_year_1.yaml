delivery_revenue_requirement_topups: 265203028.84625 # sum(delivery_top_ups.total_budget)
total_delivery_revenue_requirement: 507045300.804 # delivery_revenue_requirement_from_rate_case + delivery_revenue_requirement_topups
supply_revenue_requirement_topups: 434811499.0525 # sum(supply_top_ups.total_budget)
total_delivery_and_supply_revenue_requirement: 941856799.8565 # total_delivery_revenue_requirement + supply_revenue_requirement_topups
# --- From p. 16 of PRB-2-ELEC exhibit, lines 8-9, column f & m ---
