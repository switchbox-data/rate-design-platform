# State-specific configuration for the ResStock pipeline.
#
# Top-level keys are 2-letter state codes; values are state-specific settings
# (FIPS code, per-state flags, utility assignment config, etc.).
#
# Add a new state by adding a new top-level key.  Only the fields actually
# consumed by that state's pipeline need to be set.
#
# Currently used by:
#   - data/resstock/main.py (per-state defaults: add_vulnerability_columns, utility assignment)
#   - data/resstock/utility/assign_utility.py (SUPPORTED_UTILITY_STATES derived from
#     presence of the "utility_assignment" key; dynamic module import via "module")
NY:
  state_fips: "36"
  # Whether to add LMI vulnerability columns from PUMS during metadata
  # transforms.  Used as the per-state default when the CLI flag
  # --add-vulnerability-columns is not explicitly provided.
  add_vulnerability_columns: true
  # Utility assignment configuration.  Presence of this key (even if empty)
  # automatically includes the state in SUPPORTED_UTILITY_STATES.
  #
  # "module" is the dotted Python module path containing an assign_utility()
  # function.  "kwargs" are passed as keyword arguments to that function
  # (after merging in CLI overrides for electric_poly_filename,
  # gas_poly_filename, and path_s3_gis_dir when provided).
  utility_assignment:
    module: data.resstock.utility.assign_utility_ny
    kwargs:
      # NY State Plane (meters); used for accurate area calculations in
      # PUMA <-> utility-polygon overlap.
      state_crs: 2260
      # Census TIGER/Line PUMA shapefile vintage used for GIS-based utility
      # assignment.  Must match the PUMA definitions ResStock uses.
      puma_year: 2019
      # Utility polygon CSV filenames in the GIS directory
      # (--path-s3-gis-dir).  Override via CLI (--electric-poly-filename,
      # --gas-poly-filename) if needed.
      electric_poly_filename: ny_electric_utilities_20260309.csv
      gas_poly_filename: ny_gas_utilities_20260309.csv
      # Standardized names of gas utilities excluded from building
      # assignment.  Their PUMA-overlap probabilities are zeroed and the row
      # is renormalized; if a PUMA would have no remaining gas utility after
      # exclusion, the nearest-neighbor donor PUMA's distribution is used
      # instead.  Update when the utility landscape changes.
      excluded_gas_utilities:
        - bath
        - chautauqua
        - corning
        - fillmore
        - reserve
        - stlaw
RI:
  state_fips: "44"
  add_vulnerability_columns: false
  # RI uses rule-based (non-GIS) utility assignment; no kwargs needed.
  utility_assignment:
    module: data.resstock.utility.assign_utility_ri
MD:
  state_fips: "24"
  add_vulnerability_columns: false
  utility_assignment:
    module: data.resstock.utility.assign_utility_md
    kwargs:
      # NAD83 / Maryland State Plane (feet); used for PUMA overlap area calculations.
      state_crs: 2248
      # Census TIGER/Line PUMA shapefile vintage used for GIS-based utility
      # assignment.  Must match the PUMA definitions ResStock uses (2010-def
      # for res_2024_amy2018_2 — verified: all 44 MD PUMAs match pygris year=2019).
      puma_year: 2019
      # MD uses national HIFLD shapefiles (not per-state CSVs).  Valid
      # utilities are defined in utils/utility_codes.py and filtered at
      # assignment time via filter_hifld_for_state().
CT:
  state_fips: "09"
  add_vulnerability_columns: false
  utility_assignment:
    module: data.resstock.utility.assign_utility_ct
    kwargs:
      # NAD83 / Connecticut State Plane (feet); used for PUMA overlap area calculations.
      state_crs: 2234
      # Census TIGER/Line PUMA shapefile vintage used for GIS-based utility
      # assignment.  Must match the PUMA definitions ResStock uses (2010-def
      # for res_2024_amy2018_2 — verified: all CT PUMAs use pygris year=2019).
      puma_year: 2019
      # CT uses national HIFLD shapefiles (not per-state CSVs).  Valid
      # utilities are defined in utils/utility_codes.py and filtered at
      # assignment time via filter_hifld_for_state().
