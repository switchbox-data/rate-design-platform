# ResStock pipeline defaults.
#
# Single source of truth for the fetch/modify/upload pipeline.
# Read by fetch_resstock_data.py, main.py, and the Justfile.
# Update here when switching to a new ResStock release or adding upgrade IDs.

resstock:
  release_year: 2024
  weather_file: amy2018
  release_version: 2
  upgrade_ids:
    - "0"
    - "1"
    - "2"
    - "3"
    - "4"
    - "5"
  file_types:
    - metadata
    - load_curve_hourly
    - load_curve_annual

paths:
  output_dir: /ebs/data/nrel/resstock
  s3_dir: s3://data.sb/nrel/resstock
  s3_pums_dir: s3://data.sb/census/pums

pums:
  survey: acs5
  year: "2021"
